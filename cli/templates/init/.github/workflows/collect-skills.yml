name: CollectSkills

on:
  # schedule:
  #   - cron: '0 12 * * 0'  # Weekly Sun 12:00 UTC / 21:00 JST / 07:00 EST / 04:00 PST / 13:00 CET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect skills from org repositories
        id: collect
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ORG: ${{ vars.GH_ORG }}
        run: npx harbor collect
        # For local development (source repo), use instead:
        # run: pnpm collect

      - name: Run post-collect plugins
        id: post_collect
        if: ${{ steps.collect.outcome == 'success' }}
        continue-on-error: true
        run: npx harbor post-collect --collect-id "${{ steps.collect.outputs.collect_id }}"
        # For local development (source repo), use instead:
        # run: pnpm post-collect --collect-id "${{ steps.collect.outputs.collect_id }}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update skill catalog data"
            git push
          fi

      - name: Fail when collect reports blocking issues
        if: ${{ steps.collect.outcome != 'success' }}
        run: exit 1

      - name: Fail when post-collect reports blocking issues
        if: ${{ steps.collect.outcome == 'success' && steps.post_collect.outcome != 'success' }}
        run: exit 1
